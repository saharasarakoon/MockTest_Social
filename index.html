<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test · สังคมศึกษา A-Level รหัสวิชา 70</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F1EC;
  --white: #FDFBF8;
  --ink: #1E1A15;
  --mid: #5C5347;
  --light: #9C9089;
  --rule: #DDD8CE;
  --blue: #1A3A5C;
  --blue-pale: #EBF0F6;
  --blue-mid: #2D5A8C;
  --red: #8B1A1A;
  --red-pale: #F8ECEC;
  --green: #1A4A35;
  --green-pale: #E8F4EE;
  --amber: #7A5500;
  --amber-pale: #FDF5E0;
  --d1: #4A2C8A; --d1p: #F0EBFB;
  --d2: #1A5C3A; --d2p: #E8F5EE;
  --d3: #8B4500; --d3p: #FDF0E8;
  --d4: #3A1A5C; --d4p: #F0EBFB;
  --d5: #1A4A5C; --d5p: #E8F4F8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans Thai',sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.7;
}

/* ── COVER ── */
#cover{
  min-height:100vh;
  background:var(--blue);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:40px 24px;
  position:relative;overflow:hidden;
}
#cover::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.03) 59px,rgba(255,255,255,0.03) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.03) 59px,rgba(255,255,255,0.03) 60px);
}
.cover-badge{
  display:inline-block;
  border:1.5px solid rgba(255,255,255,0.25);
  border-radius:100px;
  padding:6px 20px;
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  margin-bottom:28px;
  position:relative;
}
#cover h1{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(28px,6vw,58px);
  font-weight:700;
  color:#fff;
  line-height:1.15;
  position:relative;
  margin-bottom:12px;
}
#cover h1 span{color:rgba(255,255,255,0.45);}
.cover-sub{
  font-size:clamp(13px,2vw,16px);
  color:rgba(255,255,255,0.5);
  letter-spacing:1px;
  position:relative;
  margin-bottom:40px;
}
.cover-meta{
  display:flex;gap:0;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  margin-bottom:44px;
}
.cm-item{
  padding:16px 28px;
  border-right:1px solid rgba(255,255,255,0.1);
  text-align:center;
}
.cm-item:last-child{border-right:none;}
.cm-val{
  font-family:'Libre Baskerville',serif;
  font-size:28px;font-weight:700;
  color:#fff;line-height:1;
}
.cm-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:4px;}
.btn-start{
  padding:16px 56px;
  background:#fff;
  color:var(--blue);
  border:none;border-radius:100px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:17px;font-weight:700;
  cursor:pointer;
  position:relative;
  letter-spacing:0.5px;
  transition:all 0.2s;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.3);}
.cover-notice{
  margin-top:24px;
  font-size:12px;
  color:rgba(255,255,255,0.3);
  position:relative;
  letter-spacing:0.5px;
}

/* ── EXAM UI ── */
#examUI{display:none;}

/* TOPBAR */
.topbar{
  background:var(--blue);
  padding:0 32px;
  display:flex;align-items:center;gap:20px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
.tb-title{
  font-family:'Libre Baskerville',serif;
  font-size:14px;color:#fff;
  padding:14px 0;flex-shrink:0;
  letter-spacing:0.5px;
}
.tb-bar{flex:1;}
.tb-track{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.tb-fill{height:100%;background:rgba(255,255,255,0.5);border-radius:2px;transition:width 0.4s;}
.tb-info{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;letter-spacing:0.5px;}
.tb-timer{
  font-family:'Libre Baskerville',serif;
  font-size:18px;font-weight:700;
  color:#fff;flex-shrink:0;
  background:rgba(255,255,255,0.08);
  padding:6px 16px;border-radius:6px;
  min-width:72px;text-align:center;
}
.tb-timer.warn{color:#FFB347;background:rgba(255,179,71,0.15);}
.tb-timer.crit{color:#FF6B6B;background:rgba(255,107,107,0.15);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* MAIN */
.exam-body{max-width:900px;margin:0 auto;padding:36px 20px 100px;}

/* SECTION HEADER */
.sec-header{
  display:flex;align-items:center;gap:16px;
  margin:44px 0 20px;
}
.sec-header:first-child{margin-top:0;}
.sec-num{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:10px;
  font-family:'Libre Baskerville',serif;
  font-size:16px;font-weight:700;
  color:#fff;flex-shrink:0;
}
.sec-info{flex:1;}
.sec-title{font-size:15px;font-weight:700;color:var(--ink);}
.sec-range{font-size:11px;color:var(--light);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.sec-line{flex:1;height:1px;background:var(--rule);}

/* QUESTION CARD */
.q-card{
  background:var(--white);
  border-radius:12px;
  border:1.5px solid var(--rule);
  margin-bottom:16px;
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
  opacity:0;animation:fadeUp 0.35s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-card.answered-ok{border-color:var(--green);}
.q-card.answered-no{border-color:var(--red);}

.q-head{
  display:flex;align-items:flex-start;gap:14px;
  padding:18px 20px 14px;
}
.q-n{
  font-family:'Libre Baskerville',serif;
  font-size:13px;font-weight:700;
  color:#fff;
  background:var(--mid);
  min-width:34px;height:34px;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.2s;
}
.answered-ok .q-n{background:var(--green);}
.answered-no .q-n{background:var(--red);}

.q-body-wrap{flex:1;}
.q-scenario{
  background:var(--amber-pale);
  border-left:3px solid var(--amber);
  padding:10px 14px;
  border-radius:0 8px 8px 0;
  font-size:13.5px;
  font-style:italic;
  line-height:1.7;
  color:#4A3200;
  margin-bottom:10px;
}
.q-ask{font-size:15px;font-weight:500;line-height:1.7;color:var(--ink);}

/* OPTIONS */
.q-opts{padding:4px 20px 18px;}
.opt-btn{
  display:flex;align-items:flex-start;gap:10px;
  width:100%;padding:10px 14px;
  border-radius:8px;border:1.5px solid var(--rule);
  background:var(--bg);
  cursor:pointer;
  text-align:left;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:14px;
  color:var(--ink);
  margin-bottom:7px;
  transition:all 0.15s;
  line-height:1.6;
}
.opt-btn:last-child{margin-bottom:0;}
.opt-btn:hover:not([disabled]){
  border-color:var(--blue-mid);
  background:#EDF3FA;
  transform:translateX(3px);
}
.opt-btn[disabled]{cursor:default;}
.opt-lbl{
  font-family:'Libre Baskerville',serif;
  font-size:13px;font-weight:700;
  min-width:20px;flex-shrink:0;
  color:var(--light);
  margin-top:1px;
}
.opt-btn.correct{background:var(--green-pale);border-color:var(--green);color:var(--green);}
.opt-btn.correct .opt-lbl{color:var(--green);}
.opt-btn.wrong{background:var(--red-pale);border-color:var(--red);color:var(--red);}
.opt-btn.wrong .opt-lbl{color:var(--red);}
.opt-btn.reveal{background:var(--green-pale);border-color:var(--green);color:var(--green);opacity:0.6;}
.opt-btn.reveal .opt-lbl{color:var(--green);}

/* EXPLANATION */
.q-exp{
  display:none;
  margin:0 20px 18px;
  padding:12px 15px;
  border-radius:8px;
  font-size:13.5px;
  line-height:1.75;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.q-exp.show{display:block;}
.q-exp.ok{background:var(--green-pale);border:1px solid rgba(26,74,53,0.2);color:#1A3A28;}
.q-exp.no{background:var(--red-pale);border:1px solid rgba(139,26,26,0.2);color:#5A1010;}
.exp-h{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;}

/* UNANSWERED FLAG */
.q-card.unflagged{border-color:#E09A00;}

/* SUBMIT AREA */
.submit-area{text-align:center;margin-top:16px;}
.btn-submit{
  padding:15px 52px;
  background:var(--blue);
  color:#fff;
  border:none;border-radius:100px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:16px;font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.5px;
}
.btn-submit:hover{background:var(--blue-mid);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,58,92,0.35);}

/* RESULT */
#result{display:none;padding:60px 20px 100px;}
.result-wrap{
  max-width:720px;margin:0 auto;
  background:var(--blue);
  border-radius:20px;
  padding:56px 40px;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 24px 60px rgba(26,58,92,0.4);
}
.result-wrap::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -10%,rgba(255,255,255,0.07) 0%,transparent 65%);
}
.r-tag{
  display:inline-block;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:100px;padding:5px 18px;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.5);
  position:relative;margin-bottom:20px;
}
.r-score{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(72px,14vw,110px);
  font-weight:700;color:#fff;line-height:1;
  position:relative;margin-bottom:4px;
}
.r-score span{font-size:0.4em;color:rgba(255,255,255,0.4);}
.r-grade{
  font-size:22px;font-weight:700;
  color:rgba(255,255,255,0.8);
  position:relative;margin-bottom:8px;
}
.r-pct{
  font-family:'Libre Baskerville',serif;
  font-size:42px;font-weight:700;
  color:rgba(255,255,255,0.35);
  position:relative;margin-bottom:32px;
}
.r-breakdown{
  display:flex;gap:0;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;overflow:hidden;
  position:relative;margin-bottom:40px;
}
.rb-item{flex:1;padding:16px 12px;border-right:1px solid rgba(255,255,255,0.08);}
.rb-item:last-child{border-right:none;}
.rb-val{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:700;color:#fff;line-height:1;}
.rb-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:4px;}

/* SECTION SCORES */
.sec-scores{
  background:rgba(255,255,255,0.05);
  border-radius:12px;padding:20px;
  position:relative;margin-bottom:36px;
  text-align:left;
}
.ss-title{
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin-bottom:14px;
}
.ss-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.ss-row:last-child{margin-bottom:0;}
.ss-name{font-size:13px;color:rgba(255,255,255,0.7);min-width:180px;flex-shrink:0;}
.ss-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.ss-bar{height:100%;border-radius:4px;transition:width 0.8s ease;}
.ss-num{font-size:12px;color:rgba(255,255,255,0.5);min-width:40px;text-align:right;}
.btn-retry{
  padding:14px 44px;
  background:#fff;
  color:var(--blue);
  border:none;border-radius:100px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:16px;font-weight:700;
  cursor:pointer;
  position:relative;
  transition:all 0.2s;
}
.btn-retry:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,0.3);}

/* SECTION COLORS */
.s1{background:#4A2C8A;} .s1t{color:#4A2C8A;} .s1b{background:#7B5FBC;}
.s2{background:#1A5C3A;} .s2t{color:#1A5C3A;} .s2b{background:#3A9A6A;}
.s3{background:#8B4500;} .s3t{color:#8B4500;} .s3b{background:#C97A30;}
.s4{background:#3A1A5C;} .s4t{color:#3A1A5C;} .s4b{background:#7B5FBC;}
.s5{background:#1A4A5C;} .s5t{color:#1A4A5C;} .s5b{background:#3A8AAC;}

@media(max-width:600px){
  .topbar{padding:0 16px;gap:12px;}
  .tb-title{font-size:12px;}
  .exam-body{padding:24px 12px 80px;}
  .q-ask{font-size:14px;}
  .opt-btn{font-size:13px;}
  .cover-meta{flex-direction:column;gap:0;}
  .cm-item{border-right:none;border-bottom:1px solid rgba(255,255,255,0.1);}
  .cm-item:last-child{border-bottom:none;}
  .result-wrap{padding:40px 24px;}
  .r-breakdown{flex-direction:column;}
  .rb-item{border-right:none;border-bottom:1px solid rgba(255,255,255,0.08);}
  .ss-name{min-width:130px;}
}
</style>
</head>
<body>

<!-- ════════════ COVER ════════════ -->
<div id="cover">
  <div class="cover-badge">Mock Examination · รหัสวิชา 70</div>
  <h1>A-Level<br><span>สังคมศึกษา</span></h1>
  <p class="cover-sub">อิงโครงสร้างข้อสอบจริง ปี 2567–2568 · แบบปรนัย 5 ตัวเลือก</p>
  <div class="cover-meta">
    <div class="cm-item"><div class="cm-val">50</div><div class="cm-lbl">ข้อ</div></div>
    <div class="cm-item"><div class="cm-val">90</div><div class="cm-lbl">นาที</div></div>
    <div class="cm-item"><div class="cm-val">100</div><div class="cm-lbl">คะแนน</div></div>
    <div class="cm-item"><div class="cm-val">5</div><div class="cm-lbl">ด้าน</div></div>
  </div>
  <button class="btn-start" onclick="startExam()">เริ่มทำข้อสอบ →</button>
  <p class="cover-notice">⏱ จับเวลา 90 นาที · กดส่งคำตอบเมื่อทำเสร็จ</p>
</div>

<!-- ════════════ EXAM UI ════════════ -->
<div id="examUI">
  <div class="topbar">
    <div class="tb-title">Mock Test · สังคม A-Level</div>
    <div class="tb-bar">
      <div class="tb-track"><div class="tb-fill" id="tbFill" style="width:0%"></div></div>
      <div class="tb-info"><span id="tbTxt">0 / 50 ข้อ</span><span id="tbPct">0%</span></div>
    </div>
    <div class="tb-timer" id="timer">90:00</div>
  </div>
  <div class="exam-body" id="examBody"></div>
</div>

<!-- ════════════ RESULT ════════════ -->
<div id="result"></div>

<script>
// ════════════════════════════════════════════
//  QUESTION DATA — 50 ข้อ · 5 ด้าน
// ════════════════════════════════════════════
const SECTIONS = [
  {
    id:1, title:"ด้านที่ 1 — ศาสนา ศีลธรรม จริยธรรม",
    range:"ข้อ 1–10", cls:"s1", tcls:"s1t", bcls:"s1b",
    qs:[
      {
        scenario:'จากบทเพลง "ใจเป็นนาย กายเป็นบ่าว" ในท่อนที่ว่า "ตาที่ยังคงบอดเพราะคำว่ารัก ตัวที่ยังจมปลักกับภาพความหลัง... ร่างก็เป็นได้แค่บ่าวให้ใจบงการชักนำ"',
        ask:"เนื้อเพลงดังกล่าวสอดคล้องกับหลักธรรมนิวรณ์ 5 ในข้อใดมากที่สุด",
        opts:["อุทธัจจกุกกุจจะ และ ถีนมิทธะ","พยาบาท และ กามฉันทะ","ถีนมิทธะ และ วิจิกิจฉา","วิจิกิจฉา และ พยาบาท","กามฉันทะ และ อุทธัจจกุกกุจจะ"],
        ans:4,
        exp:"กามฉันทะ = ความยึดติดในความรัก/กาม | อุทธัจจกุกกุจจะ = ความฟุ้งซ่าน คิดวนซ้ำ ทุกข์ใจ เนื้อเพลงสะท้อนทั้งสองข้อนี้ชัดเจน (เฉลยข้อสอบจริงปี 68)"
      },
      {
        scenario:'กรณีที่อาจารย์ "คนตื่นธรรม" ถ่ายทอดพระธรรมทางโซเชียลมีเดียและเกิดกระแสโต้แย้งว่าขัดกับหลักธรรม',
        ask:"ควรแนะนำให้พุทธศาสนิกชนศึกษาคัมภีร์ในข้อใดเพื่อตรวจสอบความถูกต้อง",
        opts:["พระไตรปิฎก และ อรรถกถา","วินัยปิฎก และ อนุฎีกา","อรรถกถา และ ฎีกา","พุทธวจน และ ฎีกา","ฎีกา และ อนุฎีกา"],
        ans:0,
        exp:"พระไตรปิฎก = บันทึกพุทธวจนะโดยตรง + อรรถกถา = อธิบายขยายความ ทั้งสองเป็นหลักฐานชั้นต้นที่น่าเชื่อถือสูงสุด (เฉลยปี 68)"
      },
      {
        ask:"พุทธศาสนิกชนในข้อใดปฏิบัติตนเกี่ยวกับพิธีทอดกฐิน 'ไม่ถูกต้อง'",
        opts:[
          "นายประยูรเข้าร่วมทอดกฐินสามัคคีของชุมชนในวันขึ้น 13 ค่ำ เดือน 12",
          "นางสาวประกอบเป็นประธานในพิธีทอดกฐินหลวงที่วัดประจำจังหวัด",
          "นางสาวประพีร์บอกบุญเร่งด่วนเพื่อทำจุลกฐินให้วัดที่ยังไม่ได้รับ",
          "นางประภาเข้าร่วมเฝ้าในการเสด็จพระราชดำเนินทอดกฐินต้น",
          "นายประสิทธิ์จองกฐินพระราชทานต่อกรมการศาสนาเพื่อนำไปทอด"

      {

          "ประเทศพัฒนาแล้ว — ประชากรวัยเด็กและวัยทำงานใกล้เคียงกัน",

        exp:"ประเทศพัฒนาแล้วมีอัตราการเพิ่มประชากรต่ำ ไม่ใช่รวดเร็ว เพราะอัตราการเกิดต่ำ ส่วนที่เพิ่มเร็วคือประเทศกำลังพัฒนา (เฉลยปี 68)"

// Flatten all questions
const ALL_Q = [];
SECTIONS.forEach(sec => sec.qs.forEach((q,i) => ALL_Q.push({...q,sec,localIdx:i})));
const TOTAL = ALL_Q.length; // 50
const TIME_SEC = 90 * 60;

let answered = new Array(TOTAL).fill(null);
let timerInterval = null;
let secLeft = TIME_SEC;
let started = false;

// Section scores tracking
let secScores = {};
SECTIONS.forEach(s => { secScores[s.id] = {correct:0,total:s.qs.length}; });

// ════════ START EXAM ════════
function startExam() {
  started = true;
  document.getElementById('cover').style.display = 'none';
  document.getElementById('examUI').style.display = 'block';
  buildExam();
  startTimer();
  window.scrollTo(0,0);
}

function buildExam() {
  const body = document.getElementById('examBody');
  body.innerHTML = '';
  let qGlobal = 0;

  SECTIONS.forEach((sec,si) => {
    // Section header
    const sh = document.createElement('div');
    sh.className = 'sec-header';
    sh.innerHTML = `
      <div class="sec-num ${sec.cls}" style="font-size:14px">${sec.id}</div>
      <div class="sec-info">
        <div class="sec-title">${sec.title}</div>
        <div class="sec-range">${sec.range}</div>
      </div>
      <div class="sec-line"></div>`;
    body.appendChild(sh);

    sec.qs.forEach((q,qi) => {
      const idx = qGlobal++;
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `card-${idx}`;
      card.style.animationDelay = `${qi * 0.04}s`;

      const LABS = ['1','2','3','4','5'];
      const optsHtml = q.opts.map((o,oi) => `
        <button class="opt-btn" id="opt-${idx}-${oi}" onclick="pick(${idx},${oi})">
          <span class="opt-lbl">${LABS[oi]}.</span><span>${o}</span>
        </button>`).join('');

      card.innerHTML = `
        <div class="q-head">
          <div class="q-n" id="qn-${idx}">${idx+1}</div>
          <div class="q-body-wrap">
            ${q.scenario ? `<div class="q-scenario">${q.scenario}</div>` : ''}
            <div class="q-ask">${q.ask}</div>
          </div>
        </div>
        <div class="q-opts">${optsHtml}</div>
        <div class="q-exp" id="exp-${idx}">
          <div class="exp-h" id="exph-${idx}"></div>
          <div id="expb-${idx}"></div>
        </div>`;
      body.appendChild(card);
    });
  });

  // Submit button
  const sa = document.createElement('div');
  sa.className = 'submit-area';
  sa.innerHTML = `<button class="btn-submit" onclick="submitExam()">ส่งคำตอบและดูผล →</button>`;
  body.appendChild(sa);
}

// ════════ PICK ANSWER ════════
function pick(idx, oi) {
  if (answered[idx] !== null) return;
  answered[idx] = oi;

  const q = ALL_Q[idx];
  const correct = oi === q.ans;

  if (correct) secScores[q.sec.id].correct++;

  // Style options
  q.opts.forEach((_,i) => {
    const btn = document.getElementById(`opt-${idx}-${i}`);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add(correct && i===oi ? 'correct' : 'reveal');
    else if (i === oi) btn.classList.add('wrong');
  });

  const card = document.getElementById(`card-${idx}`);
  card.classList.add(correct ? 'answered-ok' : 'answered-no');
  document.getElementById(`qn-${idx}`).style.background = correct ? 'var(--green)' : 'var(--red)';

  const exp = document.getElementById(`exp-${idx}`);
  exp.classList.add('show', correct ? 'ok' : 'no');
  document.getElementById(`exph-${idx}`).textContent = correct ? '✓ ถูกต้อง' : '✗ ไม่ถูกต้อง — เฉลย';
  document.getElementById(`expb-${idx}`).textContent = q.exp;

  updateBar();
}

// ════════ TIMER ════════
function startTimer() {
  timerInterval = setInterval(() => {
    secLeft--;
    updateTimerDisplay();
    if (secLeft <= 0) {
      clearInterval(timerInterval);
      submitExam();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secLeft/60);
  const s = secLeft % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'tb-timer' + (secLeft<=300 ? (secLeft<=60?' crit':' warn') : '');
}

// ════════ UPDATE BAR ════════
function updateBar() {
  const done = answered.filter(x => x!==null).length;
  const pct = Math.round(done/TOTAL*100);
  document.getElementById('tbFill').style.width = pct+'%';
  document.getElementById('tbTxt').textContent = `${done} / ${TOTAL} ข้อ`;
  document.getElementById('tbPct').textContent = pct+'%';
}

// ════════ SUBMIT ════════
function submitExam() {
  clearInterval(timerInterval);

  // Mark unanswered
  ALL_Q.forEach((q,idx) => {
    if (answered[idx] === null) {
      answered[idx] = -1;
      q.opts.forEach((_,i) => {
        const btn = document.getElementById(`opt-${idx}-${i}`);
        btn.disabled = true;
        if (i === q.ans) btn.classList.add('reveal');
      });
      document.getElementById(`card-${idx}`).classList.add('answered-no');
      document.getElementById(`qn-${idx}`).style.background = 'var(--amber)';
      const exp = document.getElementById(`exp-${idx}`);
      exp.classList.add('show','no');
      document.getElementById(`exph-${idx}`).textContent = '— ไม่ได้ตอบ · เฉลย';
      document.getElementById(`expb-${idx}`).textContent = q.exp;
    }
  });
  updateBar();

  // Show result
  const total = answered.filter((a,i) => a === ALL_Q[i].ans).length;
  showResult(total);
}

// ════════ RESULT ════════
function showResult(total) {
  document.getElementById('examUI').style.display = 'none';
  const pct = Math.round(total/TOTAL*100);
  let grade, emoji;
  if (pct>=90) {grade='ยอดเยี่ยม';emoji='🏆';}
  else if (pct>=75) {grade='ดีมาก';emoji='⭐';}
  else if (pct>=60) {grade='ผ่าน';emoji='✅';}
  else if (pct>=50) {grade='พอใช้';emoji='📖';}
  else {grade='ต้องทบทวนเพิ่ม';emoji='💪';}

  const BAR_COLORS = ['#7B5FBC','#3A9A6A','#C97A30','#7B5FBC','#3A8AAC'];
  const secRowsHtml = SECTIONS.map((s,i) => {
    const sc = secScores[s.id];
    const p = Math.round(sc.correct/sc.total*100);
    return `<div class="ss-row">
      <div class="ss-name">${s.title.split('—')[0].trim()}</div>
      <div class="ss-bar-wrap"><div class="ss-bar" style="width:${p}%;background:${BAR_COLORS[i]}"></div></div>
      <div class="ss-num">${sc.correct}/${sc.total}</div>
    </div>`;
  }).join('');

  const res = document.getElementById('result');
  res.style.display = 'block';
  res.innerHTML = `
    <div class="result-wrap">
      <div class="r-tag">ผลการสอบ Mock Test</div>
      <div class="r-score">${total}<span>/${TOTAL}</span></div>
      <div class="r-grade">${emoji} ${grade}</div>
      <div class="r-pct">${pct}%</div>
      <div class="r-breakdown">
        <div class="rb-item"><div class="rb-val">${total}</div><div class="rb-lbl">ถูก</div></div>
        <div class="rb-item"><div class="rb-val">${TOTAL-total}</div><div class="rb-lbl">ผิด/ข้าม</div></div>
        <div class="rb-item"><div class="rb-val">${total*2}</div><div class="rb-lbl">คะแนน (จาก 100)</div></div>
      </div>
      <div class="sec-scores">
        <div class="ss-title">คะแนนแต่ละด้าน</div>
        ${secRowsHtml}
      </div>
      <button class="btn-retry" onclick="location.reload()">ทำใหม่อีกครั้ง</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
